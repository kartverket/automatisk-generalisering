[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = [
    "F401",  # unused imports
    "I",     # isort (import order and grouping)
]

[tool.ruff.lint.isort]
known-first-party = [
    "composition_configs",
    "constants",
    "custom_tools",
    "env_setup",
    "file_manager",
    "generalization",
    "input_data",
    "tests",
]
